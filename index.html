
<!DOCTYPE html>

    <title>MitZay Agency | Marketing Digital y Automatización con IA</title>
    <meta name="description" content="Transforma tu negocio con MitZay Agency. Ofrecemos diseño web, contenido con IA y automatización para escalar tu presencia digital." />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#00DC01',
              dark: '#000000',
              surface: '#0A0A0A',
              accent: '#00FF01',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              poppins: ['Poppins', 'sans-serif'],
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
            },
            keyframes: {
              glow: {
                '0%': { boxShadow: '0 0 5px #00DC01, 0 0 10px #00DC01' },
                '100%': { boxShadow: '0 0 20px #00DC01, 0 0 40px #00DC01' },
              }
            }
          }
        }
      }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    
    <style>
      body {
        background-color: #000000;
        color: #F5F6F7;
        overflow-x: hidden;
      }
      .green-glow {
        box-shadow: 0 0 15px rgba(0, 220, 1, 0.1);
        transition: all 0.3s ease-in-out;
      }
      .green-glow:hover {
        box-shadow: 0 0 25px rgba(0, 220, 1, 0.4);
      }
      .glass {
        background: rgba(10, 10, 10, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .text-gradient {
        background: linear-gradient(to right, #ffffff, #00DC01);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #000;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #00DC01;
      }
    </style>
