
<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="theme-color" content="#000000" />
    <title>MitZay Agency | Marketing Digital y Automatización con IA</title>
    <meta name="description" content="Transforma tu negocio con MitZay Agency. Ofrecemos diseño web, contenido con IA y automatización para escalar tu presencia digital de forma recurrente." />
    
    <!-- Polyfill para process.env (Evita el error 'process is not defined' en Netlify) -->
    <script>
      window.process = { env: { API_KEY: "" } };
    </script>

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MitZay Agency | Marketing Digital con IA" />
    <meta property="og:description" content="Diseño web, contenido y automatización con IA para escalar tu negocio." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&q=80&w=1200" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#00DC01',
              dark: '#000000',
              surface: '#0A0A0A',
              accent: '#00FF01',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              poppins: ['Poppins', 'sans-serif'],
              montserrat: ['Montserrat', 'sans-serif'],
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'slide-up': 'slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            },
            keyframes: {
              glow: {
                '0%': { boxShadow: '0 0 5px #00DC01, 0 0 10px #00DC01' },
                '100%': { boxShadow: '0 0 20px #00DC01, 0 0 40px #00DC01' },
              },
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(60px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
      :root { 
        color-scheme: dark;
      }
      body {
        background-color: #000000;
        color: #F5F6F7;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        position: relative;
        font-family: 'Inter', sans-serif;
      }

      .services-gradient-bg {
        background: linear-gradient(-45deg, #00ff00, #008a00, #010547, #050f9c, #e35300, #b50d88);
        background-size: 400% 400%;
        animation: services-gradient-animation 15s ease infinite;
        min-height: 100vh;
      }

      @keyframes services-gradient-animation {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .large-header {
        position: absolute;
        width: 100%;
        height: 100%;
        background: #111;
        overflow: hidden;
        background-size: cover;
        background-position: center center;
        z-index: 1;
      }
      #large-header {
        background-image: url('https://www.marcoguglie.it/Codepen/AnimatedHeaderBg/demo-1/img/demo-1-bg.jpg');
      }
      .main-title {
        position: absolute;
        margin: 0;
        padding: 0;
        color: #f9f1e9;
        text-align: center;
        top: 50%;
        left: 50%;
        -webkit-transform: translate3d(-55%,-50%,0);
        transform: translate3d(-55%,-50%,0);
        z-index: 2;
        width: 100%;
        max-width: 1000px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .demo-1 .main-title {
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .main-title .thin {
        font-weight: 200;
      }
      @media only screen and (max-width : 768px) {
        .demo-1 .main-title {
          font-size: 0.8rem;
          -webkit-transform: translate3d(-50%,-50%,0);
          transform: translate3d(-50%,-50%,0);
        }
      }

      .glass {
        background: rgba(0, 0, 0, 0.65);
        backdrop-filter: blur(20px) saturate(160%);
        -webkit-backdrop-filter: blur(20px) saturate(160%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
      }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      .horizontal-section {
        min-width: calc(100vw - 5rem);
        height: 100vh;
        scroll-snap-align: start;
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
      }

      @keyframes switch {
        0% { opacity: 0; filter: blur(20px); transform: scale(4); }
        5% { opacity: 1; filter: blur(0); transform: scale(1); }
        15% { opacity: 1; filter: blur(0); transform: scale(0.98); }
        20% { opacity: 0; filter: blur(10px); transform: scale(0.9); }
        100% { opacity: 0; }
      }

      #fly-in {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        text-transform: uppercase;
        color: #ffffff;
        text-align: center;
        width: 100%;
        height: 35vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 50;
      }

      #fly-in div {
        position: absolute;
        opacity: 0;
        width: 100%;
        animation: switch 15s linear infinite;
        font-size: 2.5rem;
        padding: 0 1rem;
        line-height: 1.1;
        letter-spacing: -0.02em;
        pointer-events: none;
      }

      @media (min-width: 768px) {
        #fly-in div { font-size: 5rem; }
      }

      #fly-in span {
        display: block;
        font-size: 0.3em;
        opacity: 0.9;
        letter-spacing: 0.5em;
        margin-bottom: 0.5rem;
        color: #00DC01;
        font-weight: 800;
      }

      #fly-in div:nth-child(1) { animation-delay: 0s; }
      #fly-in div:nth-child(2) { animation-delay: 3s; }
      #fly-in div:nth-child(3) { animation-delay: 6s; }
      #fly-in div:nth-child(4) { animation-delay: 9s; }
      #fly-in div:nth-child(5) { animation-delay: 12s; }

      @media (max-width: 768px) {
        body { overflow-y: auto; overflow-x: hidden; height: auto; }
        .horizontal-section { min-width: 100vw; height: auto; padding-top: 4rem; padding-bottom: 4rem; }
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Carga del módulo principal de la aplicación -->
    <script type="module" src="index.tsx"></script>
  </body>
</html>
