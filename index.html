
<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="theme-color" content="#000000" />
    <title>MitZay Agency | Marketing Digital y Automatización con IA</title>
    <meta name="description" content="Transforma tu negocio con MitZay Agency. Ofrecemos diseño web, contenido con IA y automatización para escalar tu presencia digital de forma recurrente." />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MitZay Agency | Marketing Digital con IA" />
    <meta property="og:description" content="Diseño web, contenido y automatización con IA para escalar tu negocio." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&q=80&w=1200" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#00DC01',
              dark: '#000000',
              surface: '#0A0A0A',
              accent: '#00FF01',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              poppins: ['Poppins', 'sans-serif'],
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
              'fade-in': 'fadeIn 0.5s ease-out forwards',
            },
            keyframes: {
              glow: {
                '0%': { boxShadow: '0 0 5px #00DC01, 0 0 10px #00DC01' },
                '100%': { boxShadow: '0 0 20px #00DC01, 0 0 40px #00DC01' },
              },
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            },
            boxShadow: {
              '3xl': '0 35px 60px -15px rgba(0, 0, 0, 0.5)',
            }
          }
        }
      }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        background-color: #000000;
        color: #F5F6F7;
        overflow-x: hidden;
        width: 100%;
        position: relative;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Prevenir scroll horizontal accidental */
      html, body {
        max-width: 100vw;
      }

      .green-glow {
        box-shadow: 0 0 15px rgba(0, 220, 1, 0.1);
        transition: all 0.3s ease-in-out;
      }
      .green-glow:hover {
        box-shadow: 0 0 25px rgba(0, 220, 1, 0.4);
      }
      .glass {
        background: rgba(10, 10, 10, 0.75);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .text-gradient {
        background: linear-gradient(to right, #ffffff, #00DC01);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      /* Animación suave para cambio de página */
      .page-transition {
        animation: fadeIn 0.4s ease-out;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #000;
      }
      ::-webkit-scrollbar-thumb {
        background: #222;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #00DC01;
      }

      /* Calendly Mobile Fixes */
      .calendly-inline-widget iframe {
        border-radius: 1.5rem !important;
      }
      
      @media (max-width: 640px) {
        .calendly-inline-widget {
          height: 550px !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
